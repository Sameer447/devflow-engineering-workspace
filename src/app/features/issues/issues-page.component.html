<section class="issues-page">
  <main class="issues-main-content">
    <div class="issues-content-inner">
      <app-issues-table [issues]="issues" (issueSelected)="openIssueDetails($event)" />
      <app-issues-metrics [metrics]="metrics" />
    </div>
  </main>

  @if (selectedIssueDetail(); as detail) {
    <app-issue-detail-drawer
      [detail]="detail"
      (closeRequested)="closeIssueDetails()"
      (expandRequested)="openFullIssueDetails()"
    />
  }
</section>
