<main class="auth-layout login-layout auth-page">
  <section class="left-panel auth-left" aria-label="DevFlow visual context">
    <div class="background-layer" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <svg class="geo-overlay" preserveAspectRatio="none" viewBox="0 0 100 100">
        <path d="M0 100 L100 0 L100 100 Z" fill="#3C3489"></path>
        <circle cx="80" cy="20" r="15" fill="#7F77DD"></circle>
      </svg>
    </div>

    <div class="brand-row">
      <span class="brand">DevFlow</span>
    </div>

    <div class="visual-center" aria-hidden="true">
      <div class="viz-grid">
        <div class="viz viz-a"></div>
        <div class="viz viz-b"></div>
        <div class="viz viz-c"></div>
      </div>
    </div>

    <div class="feature-list">
      @for (item of highlights; track item.text) {
        <article class="feature-row">
          <div class="icon-shell">
            <span class="material-symbols-outlined">{{ item.icon }}</span>
          </div>
          <p>{{ item.text }}</p>
        </article>
      }
    </div>
  </section>

  <section class="right-panel auth-right" aria-label="Login form">
    <div class="mobile-brand">
      <span>DevFlow</span>
    </div>

    <div class="form-wrap auth-form-shell">
      <div class="top-controls">
        <button
          class="theme-toggle"
          type="button"
          (click)="themeService.toggleTheme()"
          [attr.aria-label]="themeService.themeToggleAriaLabel()"
          [attr.aria-pressed]="themeService.mode() === 'dark'"
        >
          {{ themeService.mode() === 'dark' ? 'Light theme' : 'Dark theme' }}
        </button>
      </div>

      <header class="form-head">
        <h1>Welcome back</h1>
        <p>Sign in to your workspace</p>
      </header>

      <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form" novalidate>
        <label class="field" for="email">
          <span class="field-label">Email address</span>
          <input id="email" type="email" placeholder="you@company.com" formControlName="email" />
          @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
            <span class="field-error">Enter a valid email address.</span>
          }
        </label>

        <label class="field" for="password">
          <div class="field-top-row">
            <span class="field-label">Password</span>
            <a [routerLink]="'/reset-password'">Forgot password?</a>
          </div>

          <div class="password-wrap">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              formControlName="password"
            />
            <button
              class="icon-button"
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="showPassword()"
            >
              <span class="material-symbols-outlined">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
          @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
            <span class="field-error">Password is required.</span>
          }
        </label>

        <button class="submit-btn" type="submit" [disabled]="loginForm.invalid">Sign in</button>

        <div class="divider" aria-hidden="true">
          <span></span>
          <p>or</p>
          <span></span>
        </div>

        <button class="google-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
          </svg>
          Continue with Google
        </button>
      </form>

      <footer class="footer-copy">
        <p>
          Don't have an account?
          <a [routerLink]="'/register'">Sign up</a>
        </p>
      </footer>
    </div>
  </section>
</main>

<footer class="auth-footer" aria-label="DevFlow legal links">
  <div class="auth-footer-content">
    <p>© 2024 DevFlow. Orchestrated Precision for Engineers.</p>
    <nav>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Security</a>
    </nav>
  </div>
</footer>
