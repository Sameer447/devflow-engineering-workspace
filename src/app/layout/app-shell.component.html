<section class="app-shell" [class.is-collapsed]="sidebarCollapsed()">

    <app-dashboard-sidebar [navItems]="navItems" [collapsed]="sidebarCollapsed()" />

  <div class="main-host">
    <app-dashboard-topbar [title]="pageTitle()" (toggleSidebar)="toggleSidebar()" />

    <div class="page-host">
      <router-outlet />
    </div>
  </div>
</section>
